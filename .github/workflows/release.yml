name: Release

# Push a tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) and this builds
# real installers for macOS, Windows and Linux, attaches them to a draft GitHub
# Release, and publishes it only after every platform has finished successfully.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate-version:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches application versions
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${GITHUB_REF_NAME#v}"
          package_version="$(jq -r '.version' package.json)"
          tauri_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          cargo_version="$(
            grep -m 1 -E '^version[[:space:]]*=' src-tauri/Cargo.toml \
              | grep -oE '"[^"]+"' \
              | tr -d '"'
          )"

          mismatch=0
          for entry in \
            "package.json:$package_version" \
            "src-tauri/tauri.conf.json:$tauri_version" \
            "src-tauri/Cargo.toml:$cargo_version"
          do
            file="${entry%%:*}"
            version="${entry#*:}"
            if ! grep -qxF "$expected_version" <<< "$version"; then
              echo "Version mismatch: $file has '$version'; tag '$GITHUB_REF_NAME' requires '$expected_version'." >&2
              mismatch=1
            fi
          done

          exit "$mismatch"

  build:
    needs: validate-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS (Intel)
          - platform: ubuntu-22.04
            target: ""
            name: Linux
          - platform: windows-latest
            target: ""
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # webkit2gtk + friends are Tauri's Linux system deps; the other platforms
      # already ship theirs.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - run: npm ci

      # Apple code signing + notarization — DORMANT until the secrets exist.
      # This exports the APPLE_* vars to $GITHUB_ENV ONLY when a cert secret is
      # present, so they are truly ABSENT (not an empty string) otherwise. That
      # avoids the failure where tauri-action tries to import a blank cert. Add
      # all six secrets in repo Settings → Secrets to turn signing on; no code
      # change needed. See SIGNING.md.
      - name: Enable Apple signing (only when the cert secret is set)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret — building unsigned (Gatekeeper will warn)."
            exit 0
          fi
          echo "Apple signing secrets present — this build will be signed and notarized."
          # APPLE_CERTIFICATE is multi-line base64; use the $GITHUB_ENV heredoc form.
          {
            echo "APPLE_CERTIFICATE<<__GBD_CERT__"
            echo "$APPLE_CERTIFICATE"
            echo "__GBD_CERT__"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts (minisign — NOT OS code signing). Without
          # these the build still produces installers, but auto-update won't verify.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_* are inherited from $GITHUB_ENV, and only when the step above
          # set them (i.e. the cert secret exists). Absent = unsigned build.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Grok Build Desktop ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your machine below, open it, and click
            **Install Grok Build**. No terminal needed.

            - **macOS** — `.dmg` (pick Apple Silicon or Intel)
            - **Windows** — `.exe` installer or `.msi`
            - **Linux** — `.AppImage`, `.deb` or `.rpm`

            > **Heads up:** Grok edits files in the folder you open without asking
            > first. Point it at a folder under version control so you can undo.
            > See "Known limits" in the README.

            > **macOS** builds are signed and notarized — just drag to Applications
            > and double-click. **Windows** builds are not signed yet, so SmartScreen
            > warns on first open: click **More info → Run anyway**.
          # Every matrix leg contributes assets (and its updater entry) to the
          # same draft. The publish job promotes it only after all legs succeed.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  publish:
    name: Publish complete release
    needs: build
    if: ${{ success() }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # This job does not check out the repo, so every gh call needs an explicit
      # --repo; without it gh errors "not a git repository" and the gate misfires.
      REPO: ${{ github.repository }}

    steps:
      - name: Verify updater manifest and publish release
        shell: bash
        run: |
          set -euo pipefail

          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"

          if ! gh release view "$TAG" --repo "$REPO" --json isDraft --jq '.isDraft' | grep -qx true; then
            echo "Refusing to publish: release '$TAG' is not a draft." >&2
            exit 1
          fi

          mkdir release-assets
          gh release download "$TAG" --repo "$REPO" --pattern latest.json --dir release-assets

          if ! jq -e --arg version "$VERSION" '
            .version == $version
            and (.platforms | type == "object")
            and (.platforms | has("darwin-aarch64"))
            and (.platforms | has("darwin-x86_64"))
            and (.platforms | has("linux-x86_64"))
            and (.platforms | has("windows-x86_64"))
          ' release-assets/latest.json > /dev/null; then
            echo "Refusing to publish: latest.json is missing a platform or has the wrong version." >&2
            exit 1
          fi

          gh release edit "$TAG" --repo "$REPO" --draft=false
