name: CI

# Branch pushes and pull requests are the fast gate. Tag pushes are handled by
# release.yml.
on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  rust-check:
    name: Rust check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # webkit2gtk + friends are Tauri's Linux system dependencies.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # cargo check needs the frontend dist expected by Tauri's configuration.
      - run: npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # `--all-targets` so the `#[cfg(test)]` module is type-checked too: a plain
      # `cargo check` skips it entirely, and a test that never compiles is not a gate.
      - run: cd src-tauri && cargo check --all-targets
      - run: cd src-tauri && cargo test

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(jq -r '.version // empty' package.json)"
          tauri_version="$(jq -r '.version // empty' src-tauri/tauri.conf.json)"
          cargo_version="$(
            sed -n '/^\[package\][[:space:]]*$/,/^\[/ {
              s/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p
            }' src-tauri/Cargo.toml
          )"

          echo "package.json:              ${package_version}"
          echo "src-tauri/tauri.conf.json: ${tauri_version}"
          echo "src-tauri/Cargo.toml:       ${cargo_version}"

          if [[ -z "${package_version}" || -z "${tauri_version}" || -z "${cargo_version}" ]]; then
            echo "Version consistency check failed: one or more version fields are missing."
            exit 1
          fi

          if [[ "${package_version}" != "${tauri_version}" || "${package_version}" != "${cargo_version}" ]]; then
            echo "Version consistency check failed: version fields do not match."
            exit 1
          fi

          echo "Version consistency check passed: all versions match (${package_version})."
